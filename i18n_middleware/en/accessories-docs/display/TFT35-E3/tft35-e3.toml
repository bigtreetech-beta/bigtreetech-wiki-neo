## 软件配置
'''
translate = '''
## 软件配置
'''

[[block]]
key = "efc717590bf09097"
origin = '''
出厂已经包含固件，它可以直接使用。也可以按照以下方法进行升级
'''
translate = '''
出厂已经包含固件，它可以直接使用。也可以按照以下方法进行升级
'''

[[block]]
key = "9a833c2bc510950d"
origin = '''
1. 从 GitHub repo [bigtreetech/BIGTREETECH-TouchScreenFirmware](https://github.com/bigtreetech/BIGTREETECH-TouchScreenFirmware) 下载固件
2. 然后把固件复制进 SD 卡根目录
3. 把 SD 卡插入板的SD卡插槽
4. 重新给主板通电或按下重置键
5. 等待10秒后更新完成
'''
translate = '''
1. 从 GitHub repo [bigtreetech/BIGTREETECH-TouchScreenFirmware](https://github.com/bigtreetech/BIGTREETECH-TouchScreenFirmware) 下载固件
2. 然后把固件复制进 SD 卡根目录
3. 把 SD 卡插入板的SD卡插槽
4. 重新给主板通电或按下重置键
5. 等待10秒后更新完成
'''
