## 产品简介
'''

[[block]]
key = "97884e615718783c"
origin = '''
TFT35-E3 是一款中等尺寸、双模、超清晰的3D打印机显示器，可以直接替换Ender3打印机原有的液晶屏幕。
'''
translate = '''
TFT35-E3 是一款中等尺寸、双模、超清晰的3D打印机显示器，可以直接替换Ender3打印机原有的液晶屏幕。
'''

