## 接口示意图
'''
translate = '''
## 接口示意图
'''

[[block]]
key = "a0cc99e5ed169bba"
origin = '''
:::info

1.使用12864屏幕模式时，将端口EXP1和EXP2连接到主板。此模式下没有触摸功能。

2.使用串口屏模式时，通过RS232与主板上的TFT或AUX-1连接。此模式具有触摸功能

3.一键切换两种工作模式。按下编码器约3秒，直到出现模式选择页面，然后在选择模式后按下编码器。

:::
'''
translate = '''
:::info

1.使用12864屏幕模式时，将端口EXP1和EXP2连接到主板。此模式下没有触摸功能。

2.使用串口屏模式时，通过RS232与主板上的TFT或AUX-1连接。此模式具有触摸功能

3.一键切换两种工作模式。按下编码器约3秒，直到出现模式选择页面，然后在选择模式后按下编码器。

:::
'''

