[[block]]
key = "a8c6092e41823ce6"
origin = '''
| Specification   | TFT 35 SPI                                  |
| --------------- | ------------------------------------------- |
| 产品尺寸        | 98 x 56毫米                                 |
| 安装尺寸        | 98 x 56毫米。有关更多详细信息，请阅读：尺寸 |
| 输入电压        | DC 5V                                       |
| 逻辑电压        | DC 3.3V                                     |
| 屏幕尺寸        | 3.5英寸                                     |
| 分辨率          | 480x320                                     |
| SPI显示器驱动IC | ILI9488                                     |
| 触摸驱动IC      | NS2009                                      |
'''
