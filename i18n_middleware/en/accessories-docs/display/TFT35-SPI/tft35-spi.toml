[[block]]
key = "5c23a6bbc84860c5"
origin = '''
:::warning[已知问题]

如果使用 v2.2.1 版本的操作系统映像。设置为 `overlay=tft35_spi25` 而不是 `overlay=tft35_spi` 使用25Mhz的spi速度而不是默认的50Mhz，以避免显示异常。

如果使用 V2.2.1 之后的操作系统映像，默认情况下操作系统将使用更低更稳定的速度。

:::
'''
translate = '''
:::warning[已知问题]

如果使用 v2.2.1 版本的操作系统映像。设置为 `overlay=tft35_spi25` 而不是 `overlay=tft35_spi` 使用25Mhz的spi速度而不是默认的50Mhz，以避免显示异常。

如果使用 V2.2.1 之后的操作系统映像，默认情况下操作系统将使用更低更稳定的速度。

:::
'''

