origin = '''
## 编译 Klipper 固件
'''
translate = '''
## 编译 Klipper 固件
'''

[[block]]
key = "b58c7f3c437b6f83"
origin = '''
使用 ssh 连接到 Klipper Host. 然后使用以下命令进入 Klipper 目录。并且使用 `make menuconfig` 配置固件。
'''
translate = '''
使用 ssh 连接到 Klipper Host. 然后使用以下命令进入 Klipper 目录。并且使用 `make menuconfig` 配置固件。
'''

[[block]]
key = "656b8b743b9fd7b4"
origin = '''
``` shell
cd ~/klipper
make menuconfig 
```
'''
translate = '''
``` shell
cd ~/klipper
make menuconfig 
```
'''

[[block]]
key = "78f7900a784a1745"
origin = '''
<ImageView src={require('./img/adxl-firmware-config.png').default} width="80%"/>
'''
translate = '''
<ImageView src={require('@site/docs/accessories-docs/sensor/adxl345/img/adxl-firmware-config.png').default} width="80%"/>
'''

[[block]]
key = "8774d602a438d5ac"
origin = '''
当配置完成使用 `q` 来退出。使用 `y` 来保存编译选项。
'''
translate = '''
当配置完成使用 `q` 来退出。使用 `y` 来保存编译选项。
'''

[[block]]
key = "b29b749495956614"
origin = '''
然后使用 `make` 命令来开始编译 Klipper 固件
'''
translate = '''
然后使用 `make` 命令来开始编译 Klipper 固件
'''

[[block]]
key = "5b81e604caf35eea"
origin = '''
``` shell
make
```
'''
translate = '''
``` shell
make
```
'''

[[block]]
key = "6479f7c4b55cff4a"
origin = '''
## 写入固件
'''
translate = '''
## 写入固件
'''

[[block]]
key = "d33e992fa2eb5731"
origin = '''
当使用 Klipper 固件编译完成后。然后按住 `ADXL345` 的 `boot` 按钮。然后插入 `USB` 进入 `Boot` 模式。
'''
translate = '''
当使用 Klipper 固件编译完成后。然后按住 `ADXL345` 的 `boot` 按钮。然后插入 `USB` 进入 `Boot` 模式。
'''

[[block]]
key = "ac138188a847a043"
origin = '''
然后可以使用 `lsusb` 命令来确认 `ADXL345` 是否在 `Boot` 模式中。
'''
translate = '''
然后可以使用 `lsusb` 命令来确认 `ADXL345` 是否在 `Boot` 模式中。
'''

[[block]]
key = "ad8061a57dcb565c"
origin = '''
当确认 ADXL345 在 Boot 模式中后。可以使用以下命令来写入固件。
'''
translate = '''
当确认 ADXL345 在 Boot 模式中后。可以使用以下命令来写入固件。
'''

[[block]]
key = "81ecd667453eb68c"
origin = '''
``` shell
make flash FLASH_DEVICE=2e8a:0003
```
'''
translate = '''
``` shell
make flash FLASH_DEVICE=2e8a:0003
```
'''

