## Klipper SPI 配置
'''
translate = '''
## Klipper SPI Config
'''

[[block]]
key = "1cb7cc1833d23b05"
origin = '''
```klipper_cfg title="printer.cfg"
[tmc2240 stepper_x]
cs_pin: PA1
spi_software_sclk_pin: PA2
spi_software_mosi_pin: PA3
spi_software_miso_pin: PA4
run_current: 0.80
interpolate: True
stealthchop_threshold: 0
```
'''
translate = '''
