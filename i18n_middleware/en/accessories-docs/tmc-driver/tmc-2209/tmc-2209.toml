[[block]]
key = "348c7fe676dcf92f"
origin = '''
### Step/Dir 模式配置电流
'''
translate = '''
### Configuring Current in Step/Dir Mode
'''

[[block]]
key = "498d1abf9f857089"
origin = '''
Trinamic Driver 电流计算公式
'''
translate = '''
Trinamic Driver Current Calculation Formula
'''

[[block]]
key = "590a8549a10c169c"
origin = '''
$I_{RMS}=\frac{325mV}{R_{SENSE}+20mΩ}*\frac{1}{\sqrt{2}}*\frac{V_{VREF}}{2.5V}$	
'''
translate = '''
$I_{RMS}=\frac{325mV}{R_{SENSE}+20mΩ}*\frac{1}{\sqrt{2}}*\frac{V_{VREF}}{2.5V}$	
'''

[[block]]
key = "4ab5db37f37f7bce"
origin = '''
TMC 2209 驱动模块 使用 $110 mΩ _{RSENSE}$ 电阻
'''
translate = '''
Using the TMC 2209 Driver Module $110 mΩ _{RSENSE}$ Resistor
'''

[[block]]
key = "757db7496434cbe9"
origin = '''
$I_{RMS}=\frac{325mV}{110mΩ+20mΩ}*\frac{1}{\sqrt{2}}*\frac{V_{VREF}}{2.5V}$			
'''
translate = '''
$I_{RMS}=\frac{325mV}{110mΩ+20mΩ}*\frac{1}{\sqrt{2}}*\frac{V_{VREF}}{2.5V}$			
'''

[[block]]
key = "6910de228cc838b3"
origin = '''
可以简化为
'''
translate = '''
This can be simplified to
'''

[[block]]
key = "317e21b63201962c"
origin = '''
$I_{RMS}=\frac{V_{REF}}{\sqrt{2}}$
'''
translate = '''
$I_{RMS}=\frac{V_{REF}}{\sqrt{2}}$
'''

[[block]]
key = "11aadfb3f5ed80a9"
origin = '''
计算峰值电流
'''
translate = '''
Calculate the peak current
'''

[[block]]
key = "7fe9fe38a4493a5f"
origin = '''
$I_{PEAK}=I_{RMS}*\sqrt{2}=V_{REF}$
'''
translate = '''
$I_{PEAK}=I_{RMS}*\sqrt{2}=V_{REF}$
'''

[[block]]
key = "c94ac8e54e346702"
origin = '''
:::note
$V_{REF}$ 范围: 0.2V – 2.2V

默认电压 Vref: 1.2V +/- 0.1V

默认电流 RMS: ~0.9A 
:::
'''
translate = '''
:::note
$V_{REF}$ Range: 0.2V – 2.2V

Default voltage Vref: 1.2V +/- 0.1V

Default current RMS: ~0.9A 
:::
'''

[[block]]
