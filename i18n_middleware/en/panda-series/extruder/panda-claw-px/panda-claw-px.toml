[[block]]
key = "db9fec573317731e"
origin = '''
松开切刀刀柄后，卸下固定挤出机的3颗螺丝（编号为1,2,3），再轻轻拧松编号4和5的螺丝，松开PTFE管底座。然后，通过向下按压PTFE管底座压，确保气动接头完全压下后，拔出PTFE管。
'''
translate = '''
松开切刀刀柄后，卸下固定挤出机的3颗螺丝（编号为1,2,3），再轻轻拧松编号4和5的螺丝，松开PTFE管底座。然后，通过向下按压PTFE管底座压，确保气动接头完全压下后，拔出PTFE管。
'''

