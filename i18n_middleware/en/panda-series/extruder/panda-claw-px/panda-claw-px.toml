### 步骤 4: 润滑Panda Claw
'''

[[block]]
key = "c55c1825d53a8314"
origin = '''
在更换Panda Claw到挤出机之前，需要先对Panda Claw齿轮进行润滑。在从动齿轮侧面和转轴上滴少量润滑脂，如下图所示。
'''
translate = '''
在更换Panda Claw到挤出机之前，需要先对Panda Claw齿轮进行润滑。在从动齿轮侧面和转轴上滴少量润滑脂，如下图所示。
'''

[[block]]
key = "df4d43381ec8bcc2"
origin = '''
:::note

请务必避免润滑油接触到挤出齿轮的齿（如下图中蓝色高亮部分所示）。如润滑油已沾上，简单擦拭无法去除。必须使用肥皂彻底清洗齿轮，以去除油脂，之后再重新涂抹润滑油。

::: 
'''
translate = '''
:::note

请务必避免润滑油接触到挤出齿轮的齿（如下图中蓝色高亮部分所示）。如润滑油已沾上，简单擦拭无法去除。必须使用肥皂彻底清洗齿轮，以去除油脂，之后再重新涂抹润滑油。

::: 
'''

