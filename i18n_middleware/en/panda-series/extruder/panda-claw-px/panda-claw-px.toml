### 步骤 1: 移出挤出机
'''

[[block]]
key = "9d7f194a060fe66a"
origin = '''
小心地断开挤出机和热端的端子，如下图所示。
'''
translate = '''
小心地断开挤出机和热端的端子，如下图所示。
'''

[[block]]
key = "567f97b6577f7998"
origin = '''
注意：断开挤出机霍尔开关板组件的排线端子时（图中编号为1的排线端子），务必小心、轻柔地操作，避免损坏排线。
'''
