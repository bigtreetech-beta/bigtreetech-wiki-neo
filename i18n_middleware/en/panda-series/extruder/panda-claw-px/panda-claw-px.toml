[[block]]
key = "a962344f0b3bfbc4"
origin = '''
接下来，按住切刀刀柄，同时松开固定刀柄的螺丝。螺丝松开后，缓慢松开切刀刀柄，让刀柄自然下垂。
'''
translate = '''
接下来，按住切刀刀柄，同时松开固定刀柄的螺丝。螺丝松开后，缓慢松开切刀刀柄，让刀柄自然下垂。
'''

[[block]]
key = "40484e171dd17d60"
origin = '''
注意：在拆卸螺丝时，请确保螺丝刀垂直插入螺丝头，确认刀头完全插入后，再轻轻转动螺丝刀拧松螺丝，避免因操作不当导致螺丝头滑牙。
'''
translate = '''
注意：在拆卸螺丝时，请确保螺丝刀垂直插入螺丝头，确认刀头完全插入后，再轻轻转动螺丝刀拧松螺丝，避免因操作不当导致螺丝头滑牙。
'''

