注意：断开挤出机霍尔开关板组件的排线端子时（图中编号为1的排线端子），务必小心、轻柔地操作，避免损坏排线。
'''

[[block]]
key = "ef876ed4446ab56f"
origin = '''
<ImageView src={require('./img/Panda_Claw_P1_X1_Guide.webp').default} width="80%"/>
'''
