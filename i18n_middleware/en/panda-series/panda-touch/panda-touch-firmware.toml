[[block]]
key = "d2e368fb5ce5f26a"
origin = '''
* 请确保切片的`.3mf`文件与所选打印机兼容。
* 如果使用AMS，请确保AMS托盘中的耗材与切片的`.3mf`文件中的耗材一致，因为在打印开始时无法动态映射耗材。
'''
translate = '''
* 请确保切片的`.3mf`文件与所选打印机兼容。
* 如果使用AMS，请确保AMS托盘中的耗材与切片的`.3mf`文件中的耗材一致，因为在打印开始时无法动态映射耗材。
'''

[[block]]
key = "48c17352e2d27826"
origin = '''
* 如果您从USB开始打印，则Panda Touch将开始将USB闪存驱动器中的文件上传到打印机MicroSD卡的根目录。为避免上传问题，请确保：
    1. 打印机中插入了MicroSD卡。
    2. MicroSD卡的剩余容量足以写入要上传的文件。
'''
translate = '''
* 如果您从USB开始打印，则Panda Touch将开始将USB闪存驱动器中的文件上传到打印机MicroSD卡的根目录。为避免上传问题，请确保：
    1. 打印机中插入了MicroSD卡。
    2. MicroSD卡的剩余容量足以写入要上传的文件。
'''

[[block]]
key = "3bd3b317bbae035c"
origin = '''
    <ImageView src={require('./img/uploading.png').default} alt="" width="600" />
