[[block]]
key = "7471c8465eacc8c0"
origin = '''
::::

#### 将帐户下的打印机同步到本地设备

* 成功登录后，您可以选择将所有现有打印机与PandaTouch的通信方式转换为云模式。

* 只有所有打印机都使用云模式运行时，才执行此操作，如果打印机打开了`仅局域网`模式，则可以跳过此操作。如果要改变PandaTouch与打印机之间的通信方式请查看 [如何切换PandaTouch和打印机之间的通信方式](#如何切换pandatouch和打印机之间的通信方式)

    <ImageView src={require('./img/login_ok.png').default} alt="" width="600" />

* 如果您想将现有打印机与PandaTouch之间的通信方式转换为云模式，请点击`是`。 

* 在此过程中，打印机必须与PandaTouch位于同一网络上。如果网络连接不佳，您可能需要重新编辑打印机的IP地址。

    <ImageView src={require('./img/sync_ok.png').default} alt="" width="600" />

* 一旦打印机在云模式下工作，您将在多打印机视图中注意到与其卡片关联的绿色云。云表示打印机与PandaTouch之间的通信方式。

* 您还将注意到一对绿色箭头，指示与该打印机的连接状态。
    <ImageView src={require('./img/cloud_mode.png').default} alt="" width="600" />

#### 如何删除已登录的账号

* 点击账户信息右上角的`X`按钮，删除保存在PandaTouch上的账户信息。

* 删除帐户信息后，PandaTouch和打印机之间的通信模式将更改为本地模式。请注意，这不会将打印机本身设置为`仅LAN`模式，而是会告诉Panda Touch仅使用LAN模式与打印机通话，这可能会导致某些功能丢失。

    <ImageView src={require('./img/del_account.png').default} alt="" width="600" />

#### 如何切换PandaTouch和打印机之间的通信方式

* 导航到打印机/组卡页面。
* 找到要启用或禁用云模式的打印机。
* 向下滚动到该打印机的`编辑`按钮。
* 选择`启用云`将打印机与PandaTouch的通信方式切换为云模式。

:::tip

必须在设置菜单中启用云帐户，否则将无法将该打印机与PandaTouch之间的通信方式设置为云模式。

<ImageView src={require('./img/switch_work_mode.png').default} alt="" width="600" />

:::
'''
translate = '''
::::

#### 将帐户下的打印机同步到本地设备

* 成功登录后，您可以选择将所有现有打印机与PandaTouch的通信方式转换为云模式。

* 只有所有打印机都使用云模式运行时，才执行此操作，如果打印机打开了`仅局域网`模式，则可以跳过此操作。如果要改变PandaTouch与打印机之间的通信方式请查看 [如何切换PandaTouch和打印机之间的通信方式](#如何切换pandatouch和打印机之间的通信方式)

    <ImageView src={require('@site/docs/panda-series/panda-touch/img/login_ok.png').default} alt="" width="600" />

* 如果您想将现有打印机与PandaTouch之间的通信方式转换为云模式，请点击`是`。 

* 在此过程中，打印机必须与PandaTouch位于同一网络上。如果网络连接不佳，您可能需要重新编辑打印机的IP地址。

    <ImageView src={require('@site/docs/panda-series/panda-touch/img/sync_ok.png').default} alt="" width="600" />

* 一旦打印机在云模式下工作，您将在多打印机视图中注意到与其卡片关联的绿色云。云表示打印机与PandaTouch之间的通信方式。

* 您还将注意到一对绿色箭头，指示与该打印机的连接状态。
    <ImageView src={require('@site/docs/panda-series/panda-touch/img/cloud_mode.png').default} alt="" width="600" />

#### 如何删除已登录的账号

* 点击账户信息右上角的`X`按钮，删除保存在PandaTouch上的账户信息。

* 删除帐户信息后，PandaTouch和打印机之间的通信模式将更改为本地模式。请注意，这不会将打印机本身设置为`仅LAN`模式，而是会告诉Panda Touch仅使用LAN模式与打印机通话，这可能会导致某些功能丢失。

    <ImageView src={require('@site/docs/panda-series/panda-touch/img/del_account.png').default} alt="" width="600" />

#### 如何切换PandaTouch和打印机之间的通信方式

* 导航到打印机/组卡页面。
* 找到要启用或禁用云模式的打印机。
* 向下滚动到该打印机的`编辑`按钮。
* 选择`启用云`将打印机与PandaTouch的通信方式切换为云模式。

:::tip

必须在设置菜单中启用云帐户，否则将无法将该打印机与PandaTouch之间的通信方式设置为云模式。

<ImageView src={require('@site/docs/panda-series/panda-touch/img/switch_work_mode.png').default} alt="" width="600" />

:::
'''

