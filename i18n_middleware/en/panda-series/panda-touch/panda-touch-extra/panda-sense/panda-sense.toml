[[block]]
key = "f3c01629bf47b2dd"
origin = '''
**安装步骤:**
'''
translate = '''
**Installation Steps:**
'''

[[block]]
key = "0c953ff2e891a31a"
origin = '''
:::tip

请先将Panda Sense磁吸在机器内部，然后将连接线在打印机内部布局好。

Panda Touch 的固件需使用 V1.0.6 及以上版本。

:::
'''
translate = '''
:::tip

First magnetically attach the Panda Sense inside the machine, then route the connecting cable neatly within the printer.

The Panda Touch firmware must be version V1.0.6 or higher.

:::
'''

[[block]]
key = "f73045466a068e61"
origin = '''
1. 使用电烙铁将热熔螺母嵌入打印件中。
'''
translate = '''
1. Use a soldering iron to embed the hot melt nut into the printed part.
'''

[[block]]
key = "7419fe1e1e42eba1"
origin = '''
    <ImageView src={require('./img/panda_sense_installation1.png').default} alt="" width="600" />
'''
translate = '''
    <ImageView src={require('@site/docs/panda-series/panda-touch/panda-touch-extra/panda-sense/img/panda_sense_installation1.png').default} alt="" width="600" />
'''

[[block]]
key = "d92275e8e9f46d93"
origin = '''
2. 继续使用电烙铁将两颗热熔螺母嵌入打印件中，然后使用M3X5圆头螺丝将Panda Sense Dock固定到打印件中。
'''
translate = '''
2. Continue using the soldering iron to embed the two hot-melt nuts into the printed part, then secure the Panda Sense Dock to the printed part using M3x5 round-head screws.
'''

[[block]]
key = "834317b01e20f591"
origin = '''
    <ImageView src={require('./img/panda_sense_installation2.png').default} alt="" width="600" />
'''
translate = '''
    <ImageView src={require('@site/docs/panda-series/panda-touch/panda-touch-extra/panda-sense/img/panda_sense_installation2.png').default} alt="" width="600" />
'''

[[block]]
key = "13276a1718652d00"
origin = '''
3. 将装有Panda Sense Dock的打印件固定到Panda Touch USB Dock上。
'''
translate = '''
3. Secure the printed piece with the Panda Sense Dock attached to the Panda Touch USB Dock.
'''

[[block]]
key = "387ce6a3629e0ce3"
origin = '''
    <ImageView src={require('./img/panda_sense_installation3.png').default} alt="" width="600" />
'''
translate = '''
    <ImageView src={require('@site/docs/panda-series/panda-touch/panda-touch-extra/panda-sense/img/panda_sense_installation3.png').default} alt="" width="600" />
'''

[[block]]
key = "9e55082559ed8ce7"
origin = '''
    安装完成效果如下图所示：
'''
translate = '''
    The final installation result is shown in the figure below:
'''

[[block]]
key = "40c2b9dbcac1bc3f"
origin = '''
    <ImageView src={require('./img/panda_sense_installation4.png').default} alt="" width="600" />
'''
