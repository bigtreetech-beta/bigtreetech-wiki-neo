    <ImageView src={require('@site/docs/panda-series/panda-touch/panda-touch-extra/panda-sense/img/panda_sense_installation4.png').default} alt="" width="600" />
'''

[[block]]
key = "d0df49858ffc0e29"
origin = '''
4. 将Panda Sense Touch安装到Panda Touch I2C接口，安装完成效果如右下图所示：
'''
translate = '''
4. Install the Panda Sense Touch onto the Panda Touch I2C interface. The final installation should appear as shown in the image below:
'''

[[block]]
key = "9d1ecf0b7f6bc144"
origin = '''
    <ImageView src={require('./img/panda_sense_installation5.png').default} alt="" width="600" />
'''
