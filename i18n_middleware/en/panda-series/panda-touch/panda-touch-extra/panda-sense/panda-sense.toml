## **Specifications**
'''

[[block]]
key = "3023cb185da38157"
origin = '''
| 传感器模块           | AHT30                                   |
| -------------------- | --------------------------------------- |
| 连接接口             | PH2.0 4-pin                             |
| 工作电压             | 3.3V                                    |
| 温度检测范围和精度   | -40℃ - 120℃, ±0.5℃ (10℃ - 60℃)       |
| 湿度检测范围和精度   | 0-100%RH, ±3% (within 20%RH - 80%RH) |
| 产品尺寸             | 27.98 x 27.95 x 11mm                    |
| 连接线长             | 800mm                                   |
| Panda Touch 固件支持 | V1.0.6 及以上版本                       |
'''
translate = '''
| Sensor Module            | AHT30                                   |
| -------------------- | --------------------------------------- |
| Connection Interface      | PH2.0 4-pin                             |
| Operating Voltage             | 3.3V                                    |
| Temperature Range & Accuracy   | -40℃ - 120℃, ±0.5℃ (10℃ - 60℃)       |
| Humidity Range & Accuracy   | 0-100%RH, ±3% (within 20%RH - 80%RH) |
| Product Dimensions             | 27.98 x 27.95 x 11mm                    |
| Cable Length             | 800mm                                   |
| Panda Touch Firmware Support | V1.0.6 and above                       |
'''

