    <ImageView src={require('@site/docs/panda-series/panda-touch/panda-touch-extra/panda-sense/img/panda_sense_installation5.png').default} alt="" width="600" />
'''

[[block]]
key = "ae8fd5518108c7c2"
origin = '''
5. 将连接线插入Panda Sense Dock的接口，当Panda Touch磁吸到Panda Touch USB Dock后，Panda Sense即可正常工作。
'''
translate = '''
5. Insert the connection cable into the Panda Sense Dock's port. Once the Panda Touch magnetically attaches to the Panda Touch USB Dock, the Panda Sense will function normally.
'''

