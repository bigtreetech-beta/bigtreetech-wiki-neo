origin = '''
## **安装说明**
'''
translate = '''
## **Installation Instructions**
'''

[[block]]
key = "ee1b64f4316cb23b"
origin = '''
以下说明以Bambu Lab P1P为例。
'''
translate = '''
The following instructions use the Bambu Lab P1P as an example.
'''

[[block]]
key = "68562c7afb31db60"
origin = '''
**步骤1:** 将Panda Lux连接到打印机前门框架的下侧，使其居中。
'''
translate = '''
**Step 1:** Attach the Panda Lux to the underside of the printer's front door frame, centering it in place.
'''

[[block]]
key = "2dcf290821235f04"
origin = '''
*Panda Lux内置磁铁，便于安装。对于额外的加固，包装中包括双面胶带，但不需要双面胶带。
'''
translate = '''
*The Panda Lux has built-in magnets that allow for easy installation. For additional reinforcement, double-sided adhesive tapes are included in the package but are not required.
'''

[[block]]
key = "a759ec63da93cd01"
origin = '''
<ImageView src={require('./img/Panda_Lux_Installation1.webp').default} width="80%"/>
'''
translate = '''
<ImageView src={require('@site/docs/panda-series/module/panda-lux/img/Panda_Lux_Installation1.webp').default} width="80%"/>
'''

[[block]]
key = "7ab75c052e7b5551"
origin = '''
**步骤2:** 如果要在P1打印机（USB端口PCB）上安装，请卸下AP板的保护盖；如果要在X1打印机上安装，则打开机架右侧的塑料盖。
'''
translate = '''
**Step 2:** Remove the protective cover off of the AP board if you are installing on a P1 printer (USB port PCB) or open the plastic cover on the right side of the frame if you are installing on a X1 printer.
'''

[[block]]
key = "9461afecee0e1085"
origin = '''
**步骤3:** 如图所示，将Panda Lux电缆沿边缘接缝布线至顶部。
'''
translate = '''
**Step 3:** As shown in the image, route the Panda Lux cable along the edge seam to the top.
'''

[[block]]
key = "3ffda31b7aeb21a6"
origin = '''
*为了增加稳定性以防止电缆移动，请使用包装中提供的电工胶带将电缆牢固地固定在门框上。
'''
translate = '''
*For additional stability to prevent the cable from moving, use the electrical tape provided in the package to secure the cable firmly to the door frame.
'''

[[block]]
key = "15a1c160e38c76dc"
origin = '''
<ImageView src={require('./img/Panda_Lux_Installation2.webp').default} width="80%"/>
'''
translate = '''
<ImageView src={require('@site/docs/panda-series/module/panda-lux/img/Panda_Lux_Installation2.webp').default} width="80%"/>
'''

[[block]]
key = "6fc9d78b5afd3a59"
origin = '''
**步骤4:** 从AP板上断开库存灯条连接器。
'''
translate = '''
**Step 4:** Disconnect the stock light bar connector from the AP board.
'''

[[block]]
key = "914f7386b0460513"
origin = '''
<ImageView src={require('./img/Panda_Lux_Installation3.webp').default} width="80%"/>
'''
translate = '''
<ImageView src={require('@site/docs/panda-series/module/panda-lux/img/Panda_Lux_Installation3.webp').default} width="80%"/>
'''

[[block]]
key = "01b4e19cf827cd42"
origin = '''
**步骤5:** 连接适配器板上的Panda Lux电缆连接器。
'''
translate = '''
**Step 5:** Connect the Panda Lux cable connector on the adapter board.
'''

[[block]]
key = "1b5b9bbd4c1d21a0"
origin = '''
<ImageView src={require('./img/Panda_Lux_Installation4.webp').default} width="80%"/>
'''
translate = '''
<ImageView src={require('@site/docs/panda-series/module/panda-lux/img/Panda_Lux_Installation4.webp').default} width="80%"/>
'''

[[block]]
key = "d3b47442b87d7629"
origin = '''
**步骤6:** 剥去转接板底部的双面胶带，粘贴在合适的位置。
'''
translate = '''
**Step 6:** Peel off the double-sided tape on the bottom of the adapter board and stick it on a suitable location.
'''

[[block]]
key = "7c372d7d45ebecd4"
origin = '''
<ImageView src={require('./img/Panda_Lux_Installation5.webp').default} width="80%"/>
'''
translate = '''
<ImageView src={require('@site/docs/panda-series/module/panda-lux/img/Panda_Lux_Installation5.webp').default} width="80%"/>
'''

[[block]]
key = "066d8ed9d4dc81a9"
origin = '''
**步骤7:** 将连接电缆的一端插入AP板的库存灯条端口，将连接电缆另一端插入适配器板。
'''
translate = '''
**Step 7:** Insert one end of the connection cable into the AP board's stock light bar port, and insert the other end of the connection cable into the adapter board.
'''

[[block]]
key = "cbbc0d84cda04371"
origin = '''
注意：X1系列上的库存灯条连接器位置在塑料盖后面的框架左侧。
'''
translate = '''
Note: The stock lightbar connector location on X1 series is on the left side of the frame behind the plastic cover.
'''

[[block]]
key = "7d0c9e45d1f2cdf1"
origin = '''
<ImageView src={require('./img/Panda_Lux_Installation6.webp').default} width="80%"/>
'''
translate = '''
<ImageView src={require('@site/docs/panda-series/module/panda-lux/img/Panda_Lux_Installation6.webp').default} width="80%"/>
'''

[[block]]
key = "147b4d924e3cb7b4"
origin = '''
**步骤8:**将保护盖装回AP板（合上X1打印机的塑料盖）。
'''
translate = '''
**Step 8:** Install the protective cover back onto the AP board (close the plastic cover for X1 printers).
'''
