origin = '''
## 产品特点
'''
translate = '''
## 产品特点
'''

[[block]]
key = "164a474efcdf075e"
origin = '''
三倍风量提升，采用转速高达 45,000 RPM 的 Wonsmart （医疗设备供应商）高性能WS7040鼓风机及驱动，轻松应对高速打印任务。
'''
translate = '''
三倍风量提升，采用转速高达 45,000 RPM 的 Wonsmart （医疗设备供应商）高性能WS7040鼓风机及驱动，轻松应对高速打印任务。
'''

[[block]]
key = "36c261bfd31b5755"
origin = '''
- 45,000 最大转速；
- 6.6 Kpa 最大静压；
- 14.7 CFM 最大流量；
- 即插即用，安装过程不超过 10 分钟。（*不含所需打印件打印时间。）
- 最大风量旋钮调参，免调切片软件。
- 内外循环无极调节，满足不同耗材需求。
- 外壳采用拓竹ABS-GF耗材打印，抗热不变形，轻松承受高温封箱打印环境。
'''
translate = '''
- 45,000 最大转速；
- 6.6 Kpa 最大静压；
- 14.7 CFM 最大流量；
- 即插即用，安装过程不超过 10 分钟。（*不含所需打印件打印时间。）
- 最大风量旋钮调参，免调切片软件。
- 内外循环无极调节，满足不同耗材需求。
- 外壳采用拓竹ABS-GF耗材打印，抗热不变形，轻松承受高温封箱打印环境。
'''

