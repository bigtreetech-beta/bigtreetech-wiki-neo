origin = '''
### 内外循环模式
'''
translate = '''
### 内外循环模式
'''

[[block]]
key = "87575db8d179fd17"
origin = '''
Panda Turbo Kit 支持内循环与外循环两种气流模式，并可通过拨动调节阀实现无级切换，以适应不同的打印场景，进一步优化冷却效率与打印质量。
'''
translate = '''
Panda Turbo Kit 支持内循环与外循环两种气流模式，并可通过拨动调节阀实现无级切换，以适应不同的打印场景，进一步优化冷却效率与打印质量。
'''

[[block]]
key = "c394fa3e0fad57d4"
origin = '''
### 内循环模式
'''
translate = '''
### 内循环模式
'''

[[block]]
key = "958fcf4daba5ecbb"
origin = '''
当调节阀向下拨动时，进风口朝向打印机内部，此时Panda Turbo Kit将机箱内的空气吸入，并通过风管引导至打印头区域，实现模型内部的有效冷却（内循环模式）。
'''
translate = '''
当调节阀向下拨动时，进风口朝向打印机内部，此时Panda Turbo Kit将机箱内的空气吸入，并通过风管引导至打印头区域，实现模型内部的有效冷却（内循环模式）。
'''

