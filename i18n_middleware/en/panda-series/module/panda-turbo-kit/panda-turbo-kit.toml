## 产品简介
'''
translate = '''
## 产品简介
'''

[[block]]
key = "66c8bd7dd1555d5e"
origin = '''
BIQU Panda Turbo Kit采用医疗设备供应商 Wonsmart 提供的高品质高性能鼓风机与驱动，结合我们自主研发的电路板，转速高达 45,000 RPM，风量为原厂配置的三倍，带来即插即用的强劲冷却性能，稳定支持高速打印与高负载任务。
'''
translate = '''
BIQU Panda Turbo Kit采用医疗设备供应商 Wonsmart 提供的高品质高性能鼓风机与驱动，结合我们自主研发的电路板，转速高达 45,000 RPM，风量为原厂配置的三倍，带来即插即用的强劲冷却性能，稳定支持高速打印与高负载任务。
'''

