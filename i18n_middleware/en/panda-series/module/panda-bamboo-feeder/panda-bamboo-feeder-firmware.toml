origin = '''
    <ImageView src={require('./img/ptfe-broken.webp').default} width="256"/>
'''
translate = '''
    <ImageView src={require('@site/docs/panda-series/module/panda-bamboo-feeder/img/ptfe-broken.webp').default} width="256"/>
'''

