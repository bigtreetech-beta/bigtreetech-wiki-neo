[[block]]
key = "78424cb0f260ada0"
origin = '''
:::info[Panda Alarm AP]

Panda Alarm AP 是 Panda Alarm 广播的 WiFi 热点，允许手机/电脑直接连接到它。如果您不希望广播此热点，则可以将其关闭，但 Panda Alarm 会在无法连接到您设置的 WiFi 时自动重新打开此热点。这提供了一种故障保护方式，可以在设置的 WiFi 网络不可用的情况下重新连接到 Panda Alarm。

若设备是连接到 Panda Alarm 的 AP 热点访问的 Web UI，关闭或者修改 Panda Alarm的 AP 信息都会导致设备与 Panda Alarm 断开通信连接。为避免此类情况，建议将设备连接到与 Panda Alarm 所连接的 Wi-Fi 相同局域网下再修改此配置。

:::
'''
translate = '''
:::info[Panda Alarm AP]

Panda Alarm AP 是 Panda Alarm 广播的 WiFi 热点，允许手机/电脑直接连接到它。如果您不希望广播此热点，则可以将其关闭，但 Panda Alarm 会在无法连接到您设置的 WiFi 时自动重新打开此热点。这提供了一种故障保护方式，可以在设置的 WiFi 网络不可用的情况下重新连接到 Panda Alarm。

若设备是连接到 Panda Alarm 的 AP 热点访问的 Web UI，关闭或者修改 Panda Alarm的 AP 信息都会导致设备与 Panda Alarm 断开通信连接。为避免此类情况，建议将设备连接到与 Panda Alarm 所连接的 Wi-Fi 相同局域网下再修改此配置。

:::
'''

