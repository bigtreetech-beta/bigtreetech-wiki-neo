        - 6). 颜色对应的HSL的值，H色相的范围为：0 ~ 360°， S饱和度的范围为：0 ~ 100%，L亮度的范围为：0 ~ 100%, 可以直接修改此处的值来得到想要的颜色。如图中所示的 hsl(20, 100%, 51%) 意味着：
            - H（色相）：20°
            - S（饱和度）：100%
            - L（亮度）：51%
        - 7). 预览所设置颜色的区域
