[[block]]
key = "62a8b7b56209abc1"
origin = '''
提示：Bambu Lab P1P和X1打印机的安装过程相同。
'''
translate = '''
提示：Bambu Lab P1P和X1打印机的安装过程相同。
'''

[[block]]
key = "5f4ffa1f11590bbd"
origin = '''
**步骤1：拆下前壳体**
完全拆下前壳体总成，然后断开风扇连接器。
'''
translate = '''
**步骤1：拆下前壳体**
完全拆下前壳体总成，然后断开风扇连接器。
'''

[[block]]
key = "5077177b306d5ab6"
origin = '''
<ImageView src={require('./img/Panda_Jet_Installation1.webp').default} width="600"/>
'''
