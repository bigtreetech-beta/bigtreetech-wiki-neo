## **产品简介**
'''
translate = '''
## **产品简介**
'''

[[block]]
key = "1f78d07ba4bffd2e"
origin = '''
Panda Jet是Bambu Lab X1/P1系列打印机的升级冷却风扇。其特殊的管道可增强喷嘴周围的气流，为灯丝提供全方位冷却，增强桥接和悬垂，同时保持打印视图清晰。
'''
translate = '''
Panda Jet是Bambu Lab X1/P1系列打印机的升级冷却风扇。其特殊的管道可增强喷嘴周围的气流，为灯丝提供全方位冷却，增强桥接和悬垂，同时保持打印视图清晰。
'''

