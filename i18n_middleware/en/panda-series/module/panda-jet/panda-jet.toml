'''

[[block]]
key = "4be441a583125faa"
origin = '''
**步骤2：拆下原来的风扇导管**
拧下以下两颗固定原始风扇导管的螺钉。保留螺钉，以便以后重新组装。
'''
translate = '''
**步骤2：拆下原来的风扇导管**
拧下以下两颗固定原始风扇导管的螺钉。保留螺钉，以便以后重新组装。
'''

[[block]]
key = "97f619245cbe1c9c"
origin = '''
<ImageView src={require('./img/Panda_Jet_Installation2.webp').default} width="600"/>
'''
