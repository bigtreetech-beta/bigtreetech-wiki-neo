'''

[[block]]
key = "8a8180505c2a2dac"
origin = '''
垂直拉出原来的风扇导管，小心地将其拆下。
'''
translate = '''
垂直拉出原来的风扇导管，小心地将其拆下。
'''

[[block]]
key = "d369f307b53cd966"
origin = '''
<font size="5" color="red">重要提示：P1/X1系列打印机的最新版原厂风道已用胶粘附在前盖上，请使用平口钳或笔刀小心刮除胶体，避免损坏前盖。若拆卸过程中前盖卡扣受损，panda jetpack仍可安装牢固；若jetpack与前盖间出现较大缝隙，可酌情使用少量速干胶进行固定。</font>
'''
translate = '''
<font size="5" color="red">重要提示：P1/X1系列打印机的最新版原厂风道已用胶粘附在前盖上，请使用平口钳或笔刀小心刮除胶体，避免损坏前盖。若拆卸过程中前盖卡扣受损，panda jetpack仍可安装牢固；若jetpack与前盖间出现较大缝隙，可酌情使用少量速干胶进行固定。</font>
'''

