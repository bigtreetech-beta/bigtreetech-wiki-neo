[[block]]
key = "c517778ada962c1c"
origin = '''
Panda Lux RGB PX，专为 Bambu Lab P1/X1 系列设计，集明亮白光 LED 与可自定义 RGB 灯效，前者用于提供清晰的打印过程查看，后者可实现状态提醒及美学增强。 
'''
translate = '''
Panda Lux RGB PX，专为 Bambu Lab P1/X1 系列设计，集明亮白光 LED 与可自定义 RGB 灯效，前者用于提供清晰的打印过程查看，后者可实现状态提醒及美学增强。 
'''

