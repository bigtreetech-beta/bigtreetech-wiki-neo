## **产品简介**
'''
translate = '''
## **产品简介**
'''

[[block]]
key = "1b3cce38a3dfd5c5"
origin = '''
与E3D共同开发的Panda Revo具有无需工具、30秒喷嘴更换和Revo™HF喷嘴，可实现高达40mm³/s的燃烧流速，以及强大的60W加热器核心。与Bambu实验室的X1打印机完全兼容。提升您的打印体验！
'''
translate = '''
与E3D共同开发的Panda Revo具有无需工具、30秒喷嘴更换和Revo™HF喷嘴，可实现高达40mm³/s的燃烧流速，以及强大的60W加热器核心。与Bambu实验室的X1打印机完全兼容。提升您的打印体验！
'''

[[block]]
key = "53b10a12d3de6d92"
origin = '''
## **功能亮点**
'''
translate = '''
## **功能亮点**
'''

[[block]]
key = "6d066351d33092af"
origin = '''
- 与E3D共同开发，集成E3D RapidChange Revo™生态系统，与除Revo™皮带喷嘴外的所有Revo™喷嘴兼容。
- 采用E3D定制的NTC100k热敏电阻的60W加热器芯，满足高速高流量打印的功率要求。
- 配有0.4mm Revo™高流量喷嘴，超高流量。
- 徒手快速更换喷嘴30秒。
- 可更换喷嘴，无需更换整个喷嘴。
- 与Bambu实验室的X1系列打印机兼容。
'''
translate = '''
- 与E3D共同开发，集成E3D RapidChange Revo™生态系统，与除Revo™皮带喷嘴外的所有Revo™喷嘴兼容。
- 采用E3D定制的NTC100k热敏电阻的60W加热器芯，满足高速高流量打印的功率要求。
- 配有0.4mm Revo™高流量喷嘴，超高流量。
- 徒手快速更换喷嘴30秒。
- 可更换喷嘴，无需更换整个喷嘴。
- 与Bambu实验室的X1系列打印机兼容。
'''

