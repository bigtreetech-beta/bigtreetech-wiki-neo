[[block]]
key = "c9433c5c95958811"
origin = '''
:::note

在尝试断开X1/X1C上的热敏电阻连接器之前，请确保按下卡扣/闩锁将其打开。热敏电阻插头配备了一个卡扣/栓锁，这与风扇和加热棒连接器不同。在断开热敏电阻连接器之前，如果忽略打开锁扣/闩锁，可能会损坏热敏电阻插头和/或PCB连接器。

:::
'''
translate = '''
:::note

在尝试断开X1/X1C上的热敏电阻连接器之前，请确保按下卡扣/闩锁将其打开。热敏电阻插头配备了一个卡扣/栓锁，这与风扇和加热棒连接器不同。在断开热敏电阻连接器之前，如果忽略打开锁扣/闩锁，可能会损坏热敏电阻插头和/或PCB连接器。

:::
'''

