[[block]]
key = "bc575faf3aa7b2df"
origin = '''
:::warning

在使用和冷却过程中，有可能烫伤你的手。

您的HotEnd和打印机由您负责。我们不对因使用、误用或滥用我们的产品而造成的损害负责。

Revo喷嘴应在不使用工具的情况下用手固定，在开始打印之前，确保喷嘴完全拧紧

Revo喷嘴必须在室温下固定，以避免烧伤。

:::
'''
translate = '''
:::warning

在使用和冷却过程中，有可能烫伤你的手。

您的HotEnd和打印机由您负责。我们不对因使用、误用或滥用我们的产品而造成的损害负责。

Revo喷嘴应在不使用工具的情况下用手固定，在开始打印之前，确保喷嘴完全拧紧

Revo喷嘴必须在室温下固定，以避免烧伤。

:::
'''

