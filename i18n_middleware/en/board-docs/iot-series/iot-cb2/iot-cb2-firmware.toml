origin = '''
    <ImageView src={require('./img/CB2_System34.webp').default} width="60%"/>
'''
translate = '''
    <ImageView src={require('@site/docs/board-docs/iot-series/iot-cb2/img/CB2_System34.webp').default} width="60%"/>
'''

[[block]]
