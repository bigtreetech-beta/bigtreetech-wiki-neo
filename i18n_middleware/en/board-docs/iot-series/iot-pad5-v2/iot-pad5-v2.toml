[[block]]
key = "cc93f65bfb52fa05"
origin = '''
## 硬件规格
'''
translate = '''
## Product Features
'''

[[block]]
key = "b4f9342995e0826d"
origin = '''
| Specification    | Bigtreetech Pad5 v2.0              |
| ---------------- | ---------------------------------- |
| 屏幕尺寸         | 121.1mm*75.9mm |
| 屏幕参数         | 5寸 800x480 带电容触摸屏                           |
| USB-HOST接口         | USB2.0x3（5V 1.5A输出），USB3.0x2（5V 2.7A输出）         |
| USB-OTG接口         | USB-C                           |
| 网口     | 千兆以太网口                                 |
| 电源输入 | Type-C口 5V 5A（支持PD输入）                                |
| 逻辑电压 | 3.3V                                  |
| 拓展功能及接口       | MIPI-DSI，MIPI-CSI，40Pin-GPIO，CAN，SD-Card（无EMMC的前提可用），4Lan-FAN，Micro HDMI，RTC等                               |
| 按键       | BK+(长按加快变化)，Rotate，BK-(长按加快变化)，ON/OFF                       |
'''
translate = '''
| Specification                      | Bigtreetech Pad5 V2.0                                                                                                    |
| ---------------------------------- | ------------------------------------------------------------------------------------------------------------------------ |
| Display Size                       | 121.1mm × 75.9mm                                                                                                         |
| Screen                             | 5-inch 800 × 480 capacitive touchscreen                                                                                  |
| USB Host Ports                     | 3 × USB 2.0 (5V/1.5A output), 2 × USB 3.0 (5V/2.7A output)                                                               |
| USB OTG Port                       | USB Type-C                                                                                                               |
| Ethernet Port                      | Gigabit Ethernet                                                                                                         |
| Power Input                        | USB Type-C, 5V/5A (PD supported)                                                                                         |
| Logic Voltage                      | 3.3V                                                                                                                     |
| Expansion Functions and Interfaces | MIPI-DSI, MIPI-CSI, 40-pin GPIO, CAN, SD card (available only when eMMC is not in use), 4-pin FAN, Micro HDMI, RTC, etc. |
| Buttons                            | BK+ (Backlight +), Rotate, BK− (Backlight −), ON/OFF (hold BK+ or BK− to adjust faster)                                  |
'''
