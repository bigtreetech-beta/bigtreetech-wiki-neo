[[block]]
key = "afaf8c574b5ebfdf"
origin = '''
# SKR 系列固件 (RP2040)
'''
translate = '''
# SKR 系列固件 (RP2040)
'''

[[block]]
key = "3d1865d4540701f6"
origin = '''
使用 `RP2040` MCU 的 SKR
'''
translate = '''
使用 `RP2040` MCU 的 SKR
'''

[[block]]
key = "9debc9a58b6d331b"
origin = '''
## 构建固件
'''
translate = '''
## 构建固件
'''

[[block]]
key = "b58c7f3c437b6f83"
origin = '''
使用 ssh 连接到 Klipper Host. 然后使用以下命令进入 Klipper 目录。并且使用 `make menuconfig` 配置固件。
'''
translate = '''
使用 ssh 连接到 Klipper Host. 然后使用以下命令进入 Klipper 目录。并且使用 `make menuconfig` 配置固件。
'''

[[block]]
key = "656b8b743b9fd7b4"
origin = '''
``` shell
cd ~/klipper
make menuconfig 
```
'''
translate = '''
``` shell
cd ~/klipper
make menuconfig 
```
'''

[[block]]
key = "3c7291bf3bc0503f"
origin = '''
然后按照以下选项构建使用 `RP2040` 为 `MCU` 的 `SKR` 固件
'''
translate = '''
然后按照以下选项构建使用 `RP2040` 为 `MCU` 的 `SKR` 固件
'''

[[block]]
key = "b7fcd5b78f347b12"
origin = '''
<ImageView
    src={require('./img/skr-rp2040-make-usb.png').default}
    alt="skr rp2040 usb"
/>
'''
translate = '''
<ImageView
    src={require('@site/docs/board-docs/skr-series/img/skr-rp2040-make-usb.png').default}
    alt="skr rp2040 usb"
/>
'''

[[block]]
key = "8774d602a438d5ac"
origin = '''
当配置完成使用 `q` 来退出。使用 `y` 来保存编译选项。
'''
translate = '''
当配置完成使用 `q` 来退出。使用 `y` 来保存编译选项。
'''

[[block]]
key = "b29b749495956614"
origin = '''
然后使用 `make` 命令来开始编译 Klipper 固件
'''
translate = '''
然后使用 `make` 命令来开始编译 Klipper 固件
'''

[[block]]
key = "5b81e604caf35eea"
origin = '''
``` shell
make
```
'''
translate = '''
``` shell
make
```
'''

[[block]]
key = "6479f7c4b55cff4a"
origin = '''
## 写入固件
'''
translate = '''
## 写入固件
'''

[[block]]
key = "2e0a78c3b6896ca8"
origin = '''
:::note[USB 供电]

如果你在写入固件的时候使用 USB Type-C 接口进行供电。`VUSB` 跳线需要接上。

:::
'''
translate = '''
:::note[USB 供电]

如果你在写入固件的时候使用 USB Type-C 接口进行供电。`VUSB` 跳线需要接上。

:::
'''

[[block]]
key = "90d06b16cf5eb1ae"
origin = '''
当使用 Klipper 固件编译完成后。使用 USB Type-C 连接线连接到 Klipper Host 上。
'''
translate = '''
当使用 Klipper 固件编译完成后。使用 USB Type-C 连接线连接到 Klipper Host 上。
'''

[[block]]
key = "834e83a7c2185ec6"
origin = '''
然后插入 `SKR` 的 `boot` 跳线。然后按一下 `reset` 按钮进入 `Boot` 模式。
'''
translate = '''
然后插入 `SKR` 的 `boot` 跳线。然后按一下 `reset` 按钮进入 `Boot` 模式。
'''

[[block]]
key = "0dba79cf40db3d7a"
origin = '''
然后可以使用 `lsusb` 命令来确认 `MCU` 是否在 `Boot` 模式中。
'''
translate = '''
然后可以使用 `lsusb` 命令来确认 `MCU` 是否在 `Boot` 模式中。
'''

[[block]]
key = "769d10cf1fe46429"
origin = '''
当确认 `MCU` 在 `Boot` 模式中后。可以使用以下命令来写入固件。
'''
translate = '''
当确认 `MCU` 在 `Boot` 模式中后。可以使用以下命令来写入固件。
'''

[[block]]
key = "81ecd667453eb68c"
origin = '''
``` shell
make flash FLASH_DEVICE=2e8a:0003
```
'''
translate = '''
``` shell
make flash FLASH_DEVICE=2e8a:0003
```
'''
