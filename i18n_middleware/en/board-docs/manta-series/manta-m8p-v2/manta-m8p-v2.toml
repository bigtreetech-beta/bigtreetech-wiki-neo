'''
translate = '''
## 硬件规格
'''

[[block]]
key = "42007fc44a02ff6a"
origin = '''
| Specification    | Manta M8P v2                       |
| ---------------- | ---------------------------------- |
| MCU              | Arm Cortex-M7 STM32H723ZET6 550MHz |
| 主板供电         | DC 12V - DC 24V                    |
| 驱动供电         | 最高 DC 48V (需要驱动支持)         |
| 热床接口供电     | DC 12V - DC 24V                    |  |
| 热床最大电流     | 10A (峰值 12A)                     |
| 热端加热最大电流 | 5.5A (峰值 6A)                     |
'''
