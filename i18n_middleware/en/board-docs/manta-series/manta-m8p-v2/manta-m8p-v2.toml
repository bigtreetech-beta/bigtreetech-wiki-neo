## 简介
'''

[[block]]
key = "2234ba970e098ce0"
origin = '''
M8P 亦是在解决 Klipper 接线过于复杂的问题。一体化的 Klipper 电路控制。并且保留 Octopus 系列的部分功能，使得拓展性得到提升。
'''
translate = '''
M8P 亦是在解决 Klipper 接线过于复杂的问题。一体化的 Klipper 电路控制。并且保留 Octopus 系列的部分功能，使得拓展性得到提升。
'''

[[block]]
key = "fce7a2c7ab9c5275"
origin = '''
M8P V2 在保留 V1 的简化接线的同时更新了MCU到STM32H723。
'''
translate = '''
M8P V2 在保留 V1 的简化接线的同时更新了MCU到STM32H723。
'''

