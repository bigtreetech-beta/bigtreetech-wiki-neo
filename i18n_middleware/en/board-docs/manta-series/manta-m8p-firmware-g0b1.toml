[[block]]
key = "6479f7c4b55cff4a"
origin = '''
## 写入固件
'''
translate = '''
## 写入固件
'''

[[block]]
key = "e0c37fe86ad552b1"
origin = '''
当使用 Klipper 固件编译完成后。然后按住 `Manta M8P` 的 `boot` 按钮。然后按一下 `reset` 然后松开 `boot` 按钮进入 `DFU` 模式。
'''
translate = '''
当使用 Klipper 固件编译完成后。然后按住 `Manta M8P` 的 `boot` 按钮。然后按一下 `reset` 然后松开 `boot` 按钮进入 `DFU` 模式。
'''

[[block]]
key = "d8db4bd02407d1e9"
origin = '''
然后可以使用 `lsusb` 命令来确认 `Manta M8P` 是否在 `DFU` 模式中。
'''
translate = '''
然后可以使用 `lsusb` 命令来确认 `Manta M8P` 是否在 `DFU` 模式中。
'''

[[block]]
key = "5982ba6ab2e4aeef"
origin = '''
当确认 Manta M8P 在 DFU 模式中后。可以使用以下命令来写入固件。
'''
translate = '''
当确认 Manta M8P 在 DFU 模式中后。可以使用以下命令来写入固件。
'''

[[block]]
key = "07f5dba4134ca463"
origin = '''
``` shell
make flash FLASH_DEVICE=0483:df11
```
'''
translate = '''
``` shell
make flash FLASH_DEVICE=0483:df11
```
'''
