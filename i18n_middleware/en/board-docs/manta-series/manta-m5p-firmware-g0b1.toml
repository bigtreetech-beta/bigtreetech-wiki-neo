</Tabs>
'''

[[block]]
key = "8774d602a438d5ac"
origin = '''
当配置完成使用 `q` 来退出。使用 `y` 来保存编译选项。
'''
translate = '''
After configuration, use `q` to exit and `y` to save the build options.
'''

[[block]]
key = "b29b749495956614"
origin = '''
然后使用 `make` 命令来开始编译 Klipper 固件
'''
translate = '''
Then use the `make` command to start compiling the Klipper firmware.
'''

[[block]]
key = "5b81e604caf35eea"
origin = '''
``` shell
make
```
'''
translate = '''
``` shell
make
```
'''

[[block]]
key = "6479f7c4b55cff4a"
origin = '''
## 写入固件
'''
translate = '''
## 写入固件
'''

[[block]]
key = "4b95c3b446ddda79"
origin = '''
当使用 Klipper 固件编译完成后。然后按住 `Manta M5P` 的 `boot` 按钮。然后按一下 `reset` 然后松开 `boot` 按钮进入 `DFU` 模式。
'''
translate = '''
After compiling the Klipper firmware, press and hold the `boot` button on the `Manta M5P`. Then press `reset` once and release the `boot` button to enter `DFU` mode.
'''

[[block]]
key = "9a9de856fa57b2ee"
origin = '''
然后可以使用 `lsusb` 命令来确认 `Manta M5P` 是否在 `DFU` 模式中。
'''
translate = '''
You can then use the `lsusb` command to confirm whether the `Manta M5P` is in `DFU` mode.
'''

[[block]]
key = "d2e3cfd693be5e2c"
origin = '''
当确认 Manta M5P 在 DFU 模式中后。可以使用以下命令来写入固件。
'''
translate = '''
Once confirmed that the Manta M5P is in DFU mode, you can use the following command to flash the firmware.
'''

[[block]]
key = "07f5dba4134ca463"
origin = '''
``` shell
make flash FLASH_DEVICE=0483:df11
```
'''
translate = '''
``` shell
make flash FLASH_DEVICE=0483:df11
```
'''
