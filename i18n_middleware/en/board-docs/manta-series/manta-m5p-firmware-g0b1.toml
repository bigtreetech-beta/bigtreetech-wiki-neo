    <TabItem value="bridge" label="CAN Bridge Firmware" default>
'''

[[block]]
key = "280e030b5d0a9cb0"
origin = '''
        按照以下选项构建使用 `STM32G0B1` 为 `MCU` 的 `Manta M5P` CAN 桥接固件
        <ImageView
