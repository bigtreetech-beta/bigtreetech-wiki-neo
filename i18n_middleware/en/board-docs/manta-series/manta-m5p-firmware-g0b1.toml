        <ImageView
            src={require('./img/manta-m5p-make-usb.png').default}
            alt="manta M5P with g0b1 usb"
        />
    </TabItem>
</Tabs>
'''
translate = '''
        Build the CAN bridge firmware for `Manta M5P` using `STM32G0B1` as the `MCU` according to the following options.
        <ImageView
