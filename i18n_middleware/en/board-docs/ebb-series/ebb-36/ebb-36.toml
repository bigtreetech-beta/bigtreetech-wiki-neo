'''
translate = '''
## 硬件规格
'''

[[block]]
key = "9ec0c4f3f079c64d"
origin = '''
| EBB 36 CAN       | Specification                                                                          |
| ---------------- | -------------------------------------------------------------------------------------- |
| 外形尺寸         | 51.5mm x 37mm                                                                          |
| MCU              | ARM Cortex-M0+STM32G0B1CBT6 64MHz (v1.1/v1.2) ARM Cortex-M0 STM32F072C8T6 48MHz (v1.0) |
| 输入电压         | DC 12V - DC 24V 6A                                                                     |
| 逻辑电压         | DC 3.3V                                                                                |
| 热端加热接口     | 5A                                                                                     |
| 板载加速度传感器 | ADXL345                                                                                |
| 电机驱动         | TMC 2209                                                                               |
'''
