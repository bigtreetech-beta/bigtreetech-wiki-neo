## 产品简介
'''

[[block]]
key = "97b4855f03269c86"
origin = '''
BIGTREETECH EBB36 CAN V1.0/V1.1/v1.2 是一个用于简化工具头接线的工具头 CAN 板。EBB 36 可以通过 USB 端口或 CAN 总线进行通信，极大的简化了 3D 打印机工具头的接线和走线。
'''
translate = '''
BIGTREETECH EBB36 CAN V1.0/V1.1/v1.2 是一个用于简化工具头接线的工具头 CAN 板。EBB 36 可以通过 USB 端口或 CAN 总线进行通信，极大的简化了 3D 打印机工具头的接线和走线。
'''

