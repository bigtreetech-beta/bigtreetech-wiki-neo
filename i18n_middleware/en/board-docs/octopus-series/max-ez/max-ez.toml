## Specification
'''
translate = '''
## Specification
'''

[[block]]
key = "32f2e1c1fd1b422e"
origin = '''
| Specification    | Octopus Max EZ                     |
| ---------------- | ---------------------------------- |
| MCU              | Arm Cortex-M7 STM32H723ZET6 550MHz |
| 主板供电         | DC 12V - DC 24V                    |
| 驱动供电         | 最高 DC56V (需要驱动支持)          |
| 热床接口供电     | DC 12V - DC 24V                    |  |
| 热床最大电流     | 10A (峰值 12A)                     |
| 热端加热最大电流 | 5.5A (峰值 6A)                     |
'''
