### 100K NTC 或 PT1000 跳线配置
'''

[[block]]
key = "1c5b9435257ac1e2"
origin = '''
使用 100K NTC 时，无需连接跳线，`TH0` `TH1` `TH2` 和 `TH3`的上拉电阻为 **4.7K 0.1%**。使用 `PT1000` 时，需要通过跳线连接下图所示引脚，并联 **4.12K 0.1%** 电阻，`TH0` `TH1` `TH2`和 `TH3`的上拉电阻为 **2.2K**。
'''
translate = '''
使用 100K NTC 时，无需连接跳线，`TH0` `TH1` `TH2` 和 `TH3`的上拉电阻为 **4.7K 0.1%**。使用 `PT1000` 时，需要通过跳线连接下图所示引脚，并联 **4.12K 0.1%** 电阻，`TH0` `TH1` `TH2`和 `TH3`的上拉电阻为 **2.2K**。
'''

[[block]]
