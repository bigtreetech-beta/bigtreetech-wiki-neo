origin = '''
        当使用 `VBB` 进行供电的时候。来源为主板 `Power` 输入。最高电压为 `24V`。
        <ImageView
            src={require('./img/max-ez-driver-vbb.png').default}
            alt="max ez vbb" width="70%"
        />
    </TabItem>
    <TabItem value="high-oltage" label="Max EZ High Voltage">
