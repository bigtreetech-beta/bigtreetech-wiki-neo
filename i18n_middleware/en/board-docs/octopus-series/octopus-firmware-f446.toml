[[block]]
key = "8774d602a438d5ac"
origin = '''
当配置完成使用 `q` 来退出。使用 `y` 来保存编译选项。
'''
translate = '''
当配置完成使用 `q` 来退出。使用 `y` 来保存编译选项。
'''

[[block]]
key = "b29b749495956614"
origin = '''
然后使用 `make` 命令来开始编译 Klipper 固件
'''
translate = '''
然后使用 `make` 命令来开始编译 Klipper 固件
'''

[[block]]
key = "5b81e604caf35eea"
origin = '''
``` shell
make
```
'''
translate = '''
``` shell
make
```
'''

[[block]]
key = "6479f7c4b55cff4a"
origin = '''
## 写入固件
'''
translate = '''
## 写入固件
'''

[[block]]
key = "2e0a78c3b6896ca8"
origin = '''
:::note[USB 供电]
如果你在写入固件的时候使用 USB Type-C 接口进行供电。`VUSB` 跳线需要接上。
:::
'''
translate = '''
:::note[USB 供电]
如果你在写入固件的时候使用 USB Type-C 接口进行供电。`VUSB` 跳线需要接上。
:::
'''

[[block]]
key = "90d06b16cf5eb1ae"
origin = '''
当使用 Klipper 固件编译完成后。使用 USB Type-C 连接线连接到 Klipper Host 上。
'''
translate = '''
当使用 Klipper 固件编译完成后。使用 USB Type-C 连接线连接到 Klipper Host 上。
'''

[[block]]
key = "58e9503929b62914"
origin = '''
然后按住 `Octopus` 的 `boot` 按钮。然后按一下 `reset` 然后松开 `boot` 按钮进入 `DFU` 模式。
'''
translate = '''
然后按住 `Octopus` 的 `boot` 按钮。然后按一下 `reset` 然后松开 `boot` 按钮进入 `DFU` 模式。
'''

[[block]]
key = "3830090637c9a47c"
origin = '''
然后可以使用 `lsusb` 命令来确认 `Octopus` 是否在 `DFU` 模式中。
'''
translate = '''
然后可以使用 `lsusb` 命令来确认 `Octopus` 是否在 `DFU` 模式中。
'''

[[block]]
key = "f3ef6a155a9769a7"
origin = '''
当确认 Octopus 在 DFU 模式中后。可以使用以下命令来写入固件。
'''
translate = '''
当确认 Octopus 在 DFU 模式中后。可以使用以下命令来写入固件。
'''

[[block]]
key = "07f5dba4134ca463"
origin = '''
``` shell
make flash FLASH_DEVICE=0483:df11
```
'''
translate = '''
``` shell
make flash FLASH_DEVICE=0483:df11
```
'''
