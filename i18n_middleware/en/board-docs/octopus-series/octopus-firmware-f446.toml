[[block]]
key = "9debc9a58b6d331b"
origin = '''
## 构建固件
'''
translate = '''
## 构建固件
'''

[[block]]
key = "b58c7f3c437b6f83"
origin = '''
使用 ssh 连接到 Klipper Host. 然后使用以下命令进入 Klipper 目录。并且使用 `make menuconfig` 配置固件。
'''
translate = '''
使用 ssh 连接到 Klipper Host. 然后使用以下命令进入 Klipper 目录。并且使用 `make menuconfig` 配置固件。
'''

[[block]]
key = "656b8b743b9fd7b4"
origin = '''
``` shell
cd ~/klipper
make menuconfig 
```
'''
translate = '''
``` shell
cd ~/klipper
make menuconfig 
```
'''

[[block]]
key = "6323cb45f20056b1"
origin = '''
<Tabs groupId="octopus-make-connect">
    <TabItem value="bridge" label="CAN 桥接固件" default>
'''
translate = '''
<Tabs groupId="octopus-make-connect">
    <TabItem value="bridge" label="CAN 桥接固件" default>
'''

[[block]]
key = "deba95d125edfa5f"
origin = '''
        按照以下选项构建使用 `STM32F446` 为 `MCU` 的 `Octopus` CAN 桥接固件
