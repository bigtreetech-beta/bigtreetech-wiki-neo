[[block]]
key = "f24f89cbf275581b"
origin = '''
### USB 接口供电
'''
translate = '''
### USB 接口供电
'''

[[block]]
key = "c70a0021b91d5c5e"
origin = '''
插入跳线即可使用 `USB-C` 为 `octopus` 供电。这可以使使用DFU模式直接编译和下载固件到主板更容易。
'''
translate = '''
插入跳线即可使用 `USB-C` 为 `octopus` 供电。这可以使使用DFU模式直接编译和下载固件到主板更容易。
'''

[[block]]
key = "1b69d2f6bd3e4749"
origin = '''
如果您不连接此跳线，那么如果您想通过 `USB-C` 进行通信，则必须通过主输入电源为板供电。
'''
translate = '''
如果您不连接此跳线，那么如果您想通过 `USB-C` 进行通信，则必须通过主输入电源为板供电。
'''

[[block]]
key = "98a40492700510ab"
origin = '''
<ImageView src={require('./img/octopus-pro-usb-power.png').default} width="80%"/>
'''
translate = '''
<ImageView src={require('@site/docs/board-docs/octopus-series/octopus-pro/img/octopus-pro-usb-power.png').default} width="80%"/>
'''

[[block]]
key = "5a9c1b36b2837086"
origin = '''
### 自动断电接线
'''
translate = '''
### 自动断电接线
'''

[[block]]
key = "e596951ddc4bd319"
origin = '''
当使用 BIGTREETECH 继电器 V1.2 模块时，可以按照下图所示进行接线。
'''
translate = '''
当使用 BIGTREETECH 继电器 V1.2 模块时，可以按照下图所示进行接线。
'''

[[block]]
key = "01cffaf36bd83501"
origin = '''
<ImageView src={require('./img/octopus-pro-relay.png').default} width="80%"/>
'''
translate = '''
<ImageView src={require('@site/docs/board-docs/octopus-series/octopus-pro/img/octopus-pro-relay.png').default} width="80%"/>
'''

[[block]]
key = "1d467d765b521cd9"
origin = '''
:::warning

由于 `Relay 1.2` 模块在切断主板电源后仍将供电，因此在打印机仍连接到电源时触摸它是极其危险的。在处理此接线时，请务必断开所有主电源。

:::
'''
translate = '''
:::warning

由于 `Relay 1.2` 模块在切断主板电源后仍将供电，因此在打印机仍连接到电源时触摸它是极其危险的。在处理此接线时，请务必断开所有主电源。

:::
'''

