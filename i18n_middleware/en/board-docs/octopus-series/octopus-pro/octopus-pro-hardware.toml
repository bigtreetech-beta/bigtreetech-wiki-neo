### Raspberry Pi
'''

[[block]]
key = "4c506ba2e99f8e38"
origin = '''
Octopus Pro 支持连接到树莓派进行打印。有几种连接方式可用于连接 Raspberry Pi。
'''
translate = '''
Octopus Pro 支持连接到树莓派进行打印。有几种连接方式可用于连接 Raspberry Pi。
'''

[[block]]
key = "a6dfa5d5c82025fe"
origin = '''
- Raspberry Pi 直接连接到 USB-C 端口
- 使用 UART 或 SPI 使用直接串行连接将 Raspberry Pi 连接
'''
translate = '''
- Raspberry Pi 直接连接到 USB-C 端口
- 使用 UART 或 SPI 使用直接串行连接将 Raspberry Pi 连接
'''

