origin = '''
1. 在电脑的浏览器中输入树莓派的 IP 访问，如下图所示的路径中下载名为`sample-bigtreetech-mmb-canbus.cfg`的参考配置，如果找不到此文件，请更新 Klipper 固件源码到最新版本，或者到 GitHub 下载
