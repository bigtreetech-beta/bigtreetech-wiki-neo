origin = '''
    ```shell
    ~/klippy-env/bin/python ~/klipper/scripts/canbus_query.py can0
    ```
'''
translate = '''
    ```shell
    ~/klippy-env/bin/python ~/klipper/scripts/canbus_query.py can0
    ```
'''

[[block]]
key = "c682ce8240ce510c"
origin = '''
3. 如果检测到未初始化的 CAN 设备，上述命令将报告设备的 canbus_uuid：
'''
