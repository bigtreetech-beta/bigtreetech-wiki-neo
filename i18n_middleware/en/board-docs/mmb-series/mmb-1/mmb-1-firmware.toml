    python3 ~/katapult/scripts/flash_can.py -i can0 -f ~/klipper/out/klipper.bin -u be69315a613c
    ```
'''
translate = '''
    ```shell
    python3 ~/katapult/scripts/flash_can.py -i can0 -f ~/klipper/out/klipper.bin -u be69315a613c
    ```
'''

[[block]]
key = "3ee05a648b5a51e2"
origin = '''
    ::::info[注意]

        `be69315a613c`替换为实际的 UUID

        :::warning[注意]

            `klipper.bin` 需要提前 `make` 生成出来

        :::
'''
translate = '''
    ::::info[Note]

        Replace the UUID parameter `be69315a613c` with the actual UUID on your board. 

        :::warning[Note]

            At this point, you should have already compiled `klipper.bin` using `make`. 

        :::
'''

[[block]]
key = "2b2bf3636e541791"
origin = '''
        :::warning[注意]

            `katapult`的 **Application start offset** 为 **8KiB offset**

            所以 `Klipper` 的 **menuconfig** 中 **Bootloader offset** 也要为 **8KiB bootloader**
        :::
'''
translate = '''
        :::warning[Note]

            The **Application start offset** for `katapult` is **8KiB offset**.

            Therefore, the **Bootloader offset** in `Klipper`'s **menuconfig** must also be set to **8KiB bootloader**.
        :::
'''

[[block]]
key = "20b2150b560e81cc"
origin = '''
    ::::
    如下图已经烧录成功。

    <ImageView src={require('./img/mmb-can-klipper7.webp').default} />

4. 再次输入

    ```shell
    python3 flash_can.py -i can0 -q
    ```

    查询，此时 **Application** 由之前的 **katapult** 变为 **Klipper**，代表 Klipper 已经正常运行

    <ImageView src={require('./img/mmb-can-klipper8.webp').default} />

### 通过 DFU 进行固件更新

树莓派或 CB1 通过 DFU 更新

1. 请按住 **`Boot`** 按钮，然后使用 Type-C 线连接至树莓派/CB1，此时芯片进入 DFU 模式。

2. 在 SSH 终端命令行中输入 `lsusb` 查询 DFU 设备 ID

    ```shell
    lsusb
    ```

    <ImageView src={require('./img/mmb-can-klipper9.webp').default} />

3. 输入

    ```shell
    cd klipper
    ```

    跳转到 klipper 目录下，输入

    ```shell
    make flash FLASH_DEVICE=0483:df11
    ```

    开始烧录固件
    :::info[注意]

    将 **0483:df11** 更换为上一步中查询到的实际的设备 ID

    :::
'''
translate = '''
    ::::
    Flashing is successful, as shown in the figure below.

    <ImageView src={require('@site/docs/board-docs/mmb-series/mmb-1/img/mmb-can-klipper7.webp').default} />

4. Enter the query command again:

    ```shell
    python3 flash_can.py -i can0 -q
    ```

    At this point, the **Application** has changed from **katapult** to **Klipper**, indicating that Klipper is running normally.

    <ImageView src={require('@site/docs/board-docs/mmb-series/mmb-1/img/mmb-can-klipper8.webp').default} />

### Firmware Update via DFU

Raspberry Pi or CB1 firmware update through DFU:

1. Hold down the **`Boot`** button and connect to Raspberry Pi/CB1 with a Type-C cable. This allows the chip to enter DFU mode.

2. In the SSH terminal command line, enter `lsusb` to query the DFU device ID.

    ```shell
    lsusb
    ```

    <ImageView src={require('@site/docs/board-docs/mmb-series/mmb-1/img/mmb-can-klipper9.webp').default} />

3. Enter:

    ```shell
    cd klipper
    ```

    navigate to the klipper directory, then Enter:

    ```shell
    make flash FLASH_DEVICE=0483:df11
    ```

    to start flashing the firmware
    :::info[note]

    replace **0483:df11** with the actual device ID obtained in the previous step.

    :::
'''

[[block]]
key = "f43807f176c8548c"
origin = '''
4. 固件烧录完成后，输入
'''
