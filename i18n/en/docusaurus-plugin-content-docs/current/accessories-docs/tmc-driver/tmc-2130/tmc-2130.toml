<div class="div-table">

<ImageView
    src={require('./img/TMC2130_Title.png').default}
    alt="" width="35%" class="right-image"
/>

## 产品简介

TMC 2130 是一款高性能两相步进电机驱动芯片，具有标准SPI接口和step/dir接口。具有低噪音以及高负载驱动器不丢步。

## Specifications

| Specifications | TMC 2130 |
| -------------- | -------- |
| 驱动芯片       | TMC 2130 |
| 输入电压       | 24V      |
| 驱动电流       | 2A peak  |

</div>
'''
translate = '''
<div class="div-table">

<ImageView
    src={require('@site/docs/accessories-docs/tmc-driver/tmc-2130/img/TMC2130_Title.png').default}
    alt="" width="35%" class="right-image"
/>

## Product Overview

The TMC 2130 is a high-performance two-phase stepper motor driver IC featuring a standard SPI interface and a step/dir interface. It offers low noise and ensures no step loss even under high loads.

## Specifications

| Specifications | TMC 2130 |
| -------------- | -------- |
| Driver IC      | TMC 2130 |
| Input Voltage  | 24V      |
| Drive Current  | 2A peak  |

</div>
'''

