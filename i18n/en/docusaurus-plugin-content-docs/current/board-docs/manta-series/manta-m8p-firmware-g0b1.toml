[[block]]
key = "5a72024383e0747b"
origin = '''
## 构建固件
'''
translate = '''
## Building the Firmware
'''

[[block]]
key = "1b4a9a91ac4d0d89"
origin = '''
使用 ssh 连接到 Klipper Host. 然后使用以下命令进入 Klipper 目录。并且使用 `make menuconfig` 配置固件。
'''
translate = '''
Connect to the Klipper Host via SSH. Then use the following command to navigate to the Klipper directory. Use `make menuconfig` to configure the firmware.
'''

[[block]]
key = "a18bfc19c771a8e5"
origin = '''
``` shell
cd ~/klipper
make menuconfig 
```
'''
translate = '''
``` shell
cd ~/klipper
make menuconfig 
```
'''

[[block]]
key = "e7cf45ebecb9f02e"
origin = '''
:::info

M8P v1.0 不能使用 CAN Bridge

:::
'''
translate = '''
:::info

The M8P v1.0 cannot use the CAN Bridge

:::
'''

[[block]]
key = "15527332b9baa1d5"
origin = '''
<Tabs groupId="m8p-v1-make-connect">
    <TabItem value="bridge" label="CAN 桥接固件" default>
        按照以下选项构建使用 `STM32G0B1` 为 `MCU` 的 `Manta M8P` CAN 桥接固件
        <ImageView
            src={require('./img/manta-m8p-v1-make-bridge.png').default}
