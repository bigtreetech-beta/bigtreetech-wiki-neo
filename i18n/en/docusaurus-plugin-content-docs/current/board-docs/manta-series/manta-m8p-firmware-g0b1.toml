'''

[[block]]
key = "0dfc9894b0cc8781"
origin = '''
当配置完成使用 `q` 来退出。使用 `y` 来保存编译选项。
'''
translate = '''
When you're done configuring, use `q` to exit. Use `y` to save the compilation options.
'''

[[block]]
key = "50157bdc559de387"
origin = '''
然后使用 `make` 命令来开始编译 Klipper 固件
'''
translate = '''
Then use the `make` command to start compiling the Klipper firmware
'''

[[block]]
key = "06b3664e30aa8376"
origin = '''
``` shell
make
```
'''
translate = '''
``` shell
make
```
'''

[[block]]
key = "eb6604a4391e6abd"
origin = '''
## 写入固件
'''
translate = '''
## Writing Firmware
'''

[[block]]
key = "7b95d1d4c19c37cb"
origin = '''
当使用 Klipper 固件编译完成后。然后按住 `Manta M8P` 的 `boot` 按钮。然后按一下 `reset` 然后松开 `boot` 按钮进入 `DFU` 模式。
'''
translate = '''
Once the Klipper firmware has finished compiling, press and hold the `boot` button on the `Manta M8P`. Then press the `reset` button once and release the `boot` button to enter `DFU` mode.
'''

[[block]]
key = "10128e496ad16521"
origin = '''
然后可以使用 `lsusb` 命令来确认 `Manta M8P` 是否在 `DFU` 模式中。
'''
translate = '''
You can then use the `lsusb` command to verify whether the `Manta M8P` is in `DFU` mode.
'''

[[block]]
key = "335f711d80b084e4"
origin = '''
当确认 Manta M8P 在 DFU 模式中后。可以使用以下命令来写入固件。
'''
translate = '''
Once you have confirmed that the Manta M8P is in DFU mode, you can use the following command to flash the firmware.
'''

[[block]]
key = "468a92c419bb8844"
origin = '''
``` shell
make flash FLASH_DEVICE=0483:df11
```
'''
translate = '''
``` shell
make flash FLASH_DEVICE=0483:df11
```
'''
