## 产品简介

BIQU Panda Hotend Wizard 是深圳必趣科技有限公司推出的一款用于快速维修拓竹适配热端堵头的维修工具。用户可通过旋钮和按键进行操控，为堵头的喷嘴提供良好的维修环境，提高喷嘴的利用率。目前适配的机型包括拓竹 A1，A1 mini，P1S，X1C，P2S，H2D，H2S 等。暂时不支持 H2C-Voteck 系统热端。

## 技术规格

| Panda Hotend Wizard | 规格 |
| --- | --- |
| 主控芯片 | STM32G030F6P6 |
| 电源输入 | DC 24V 5A |
| 自带加热棒功率 | 100W |
| 产品输出最大工作功率 | 110W |
| 逻辑电压 | 3.3V |
| 加热棒温度设置限温 | $290^\circ C$ |
| 待机功率 | 0.1W |
| 最大工作电流 | 5A |

</div>
'''
translate = '''
<div class="div-table">

{/* main image */}

<ImageView
    src={require('@site/docs/panda-series/module/panda-hotend-wizard/img/panda-hotend-wizard-title.webp').default}
    alt=""
    width="35%"
    class="right-image"
/>

## Product Introduction

The Panda Hotend Wizard is a compact desktop maintenance station built specifically for Bambu Lab-compatible hotends. It helps users quickly revive clogged nozzles by providing a stable heating and cooling environment, making hotend maintenance safer, easier, and more efficient. With simple knob and button controls, users can heat, cool, and clear blocked nozzles with confidence — extending the service life of their hotends and cutting down on unnecessary replacements. This device is compatible with Bambu Lab models including the A1, A1 mini, P1S, X1C, P2S, H2D, and H2S. Please note that hotends from the H2C-Voteck system are not currently supported.

## Technical Specifications

| Panda Hotend Wizard | Specifications |
| --- | --- |
| Main Control Chip | STM32G030F6P6 |
| Power Input | DC 24V 5A |
| Built-in Heater Cartridge Power | 100W |
| Maximum Output Power | 110W |
| Logic Voltage | 3.3V |
| Heater Temperature Setting Limit | $290^\circ C$ |
| Standby Power | 0.1W |
| Maximum Operating Current | 5A |

</div>
'''

