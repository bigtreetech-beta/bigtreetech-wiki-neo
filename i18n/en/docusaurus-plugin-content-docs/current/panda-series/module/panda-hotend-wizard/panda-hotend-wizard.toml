[[block]]
key = "d2853ea8a1518814"
origin = '''
:::warning[注意]

在使用本产品时，切勿将本产品上的加热模块和自带加热模块的热端同时上电开启。本产品上的加热模块用于快拆热端维修，例如 A1 和 P2 系列热端；自带加热模块的热端包括 P1 和 X1 系列热端。同时开启会导致系统错误。

:::
'''
translate = '''
:::warning[Warning]

Do not power on the Panda Hotend Wizard heating module and a hotend's built-in heating module at the same time. P1 and X1 series hotends have their own built-in heating elements, so connect the original P1/X1 hotend cable for heating. A1 and P2 series quick-swap hotends do not have built-in heating elements, so they must be heated using the Panda Hotend Wizard heating module.

:::
'''

