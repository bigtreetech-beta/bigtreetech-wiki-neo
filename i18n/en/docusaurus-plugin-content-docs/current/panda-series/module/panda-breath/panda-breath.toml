### Installation Steps for Bambu Lab P2S
'''

[[block]]
key = "dfa993192b18e789"
origin = '''
:::warning

因为P2S腔体空间限制，目前仅支持Panda Breath V1.1安装于P2S左侧。 Panda Breath V1.0因为产品尺寸太厚，无法适配P2S机型

