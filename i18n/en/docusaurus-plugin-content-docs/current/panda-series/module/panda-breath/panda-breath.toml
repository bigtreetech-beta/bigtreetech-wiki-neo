'''
translate = '''
### Installation Steps for Snapmaker U1
'''

[[block]]
key = "32f2da7a5d50a352"
origin = '''
1. 取出预先打印好的2个压块，使用M3x14自攻螺丝预先旋入左夹持支架，此时无需完全锁紧，保持松动状态以便后续调整
'''
