## 固件重要更新

**在使用 Panda Breath 之前，请确保您的设备已更新到[V1.0.2 及其以上版本的固件](#v102)**

:::warning

此固件添加了一些重要的新功能和 bug 修复。如果不更新，由于固件中的热保护逻辑对其中一个热敏电阻过于敏感，所以每次加热 30s 后设备可能会关闭加热。新固件在首次加热时添加了一个自校准逻辑，有助于 Panda Breath 补偿控制逻辑。

:::

- **产品链接**: [点击购买](https://biqu.equipment/products/biqu-panda-breath-smart-air-filtration-and-heating-system-with-precise-temperature-regulation?_pos=1&_sid=3a4ce2d06&_ss=r&variant=42353406279778)
- **打印件下载**: [GitHub bigtreetech/Panda_Breath](https://github.com/bigtreetech/Panda_Breath/tree/master/3D%20Model/Mounting%20solution)
- **Github：** https://github.com/bigtreetech/Panda_Breath

## 修订历史

| 版本号 | 日期           | 更新内容            |
| :----- | :------------- | :------------------ |
| v1.00  | 2025年12月12日 | 初始版本            |
| v1.10  | 2026年5月30日  | 压缩产品体积适配P2S |

## 产品简介

- BIQU Panda Breath 是一款适用于 Bambu Lab 打印机的腔体加热与空气过滤模块。产品采用 300W PTC 加热元件，可快速提升腔体温度，帮助减少翘边现象，增强 ABS，ASA，PC，PA 等工程材料的层间结合力，并提升各类耗材的首层附着效果。

- 内置 HEPA + 活性炭双重过滤系统，能够过滤打印过程中产生的细微颗粒物与 VOCs，有助于降低异味并改善打印环境空气质量

</div>
'''
translate = '''
<div class="div-table">

{/* main image */}
<ImageView src={require('@site/docs/panda-series/module/panda-breath/img/panda-breath-title.webp').default} alt="" width="35%" class="right-image"/>

## Important firmware update

**Before using Panda Breath, please make sure the firmware has been updated to [V1.0.2 or later](#v102)**

:::warning

This firmware adds some important new features as well as bug fixes. Without installing it, there is the possibility that your Panda Breath may turn off after 30s of heating each time you try to use it as a result of the integrated software safety monitor being overly sensitive on one of the thermistor inputs. This firmware adds a small self-calibration feature on the very first startup which helps to identify the specific characteristics of your Panda Breath.

:::

- **Product Link**: [Buy Here](https://biqu.equipment/products/biqu-panda-breath-smart-air-filtration-and-heating-system-with-precise-temperature-regulation?_pos=1&_sid=3a4ce2d06&_ss=r&variant=42353406279778)
- **Print files are available on**: [GitHub Bigtreetech/Panda_Breath](https://github.com/bigtreetech/Panda_Breath/tree/master/3D%20Model/Mounting%20solution)
- **GitHub：** https://github.com/bigtreetech/Panda_Breath

## Revision Log

| Version | Date           | Revision            |
| :----- | :------------- | :------------------ |
| v1.00  | December 12th, 2025 | Initial Version            |
| v1.10  | May 30, 2026 | Refined product size for P2S compatibility |

## Introduction

- The BIQU Panda Breath is a chamber heater and filter for Bambu Lab printers. It uses a 300W PTC heater to warm the chamber, which helps prevent warping, strengthens layer adhesion in engineering materials (ABS, ASA, PC, PA...), and improves first-layer adhesion for all filaments.

- Its dual HEPA and carbon filters remove fine particles and VOCs from the air during printing, reducing odors and improving air quality.

</div>
'''

